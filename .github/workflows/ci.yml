name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
        os: [ubuntu-latest, windows-latest, macos-15]
        include:
          - node: 22
            os: ubuntu-latest
          - node: 24
            os: ubuntu-latest
          - node: 22
            os: windows-latest
          - node: 22
            os: macos-15

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun ci

      - name: Lint and format
        run: bunx biome ci --error-on-warnings

      - name: Build the library
        run: bun run build

      - name: Run unit tests
        run: bun run test

      - name: Type check fixtures
        run: bun run test:fixtures-types

      - name: Deploy docs
        # Only trigger deploy if previous steps pass on main branch.
        # Only fire once per branch push.
        if: matrix.os == 'macos-15' && matrix.node == 22 && github.ref == 'refs/heads/main'
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl "$deploy_url"
